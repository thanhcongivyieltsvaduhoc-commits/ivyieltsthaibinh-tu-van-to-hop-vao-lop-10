<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVY IELTS - Hệ Thống Tra Cứu Khối Thi Từ Môn Tự Chọn Lớp 10</title>
    <style>
        :root {
            --ivy-red: #bd0000; /* Màu đỏ đậm chuẩn thương hiệu IVY */
            --ivy-red-hover: #990000;
            --bg-gray: #f8f9fa;
            --border-color: #e9ecef;
            --text-dark: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* Khu vực Header tích hợp thương hiệu tinh tế */
        .brand-header {
            text-align: center;
            border-bottom: 2px solid var(--ivy-red);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .brand-logo {
            max-width: 130px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .brand-header h2 {
            color: var(--ivy-red);
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .brand-header p {
            color: #718096;
            font-size: 14px;
            margin: 8px 0 0 0;
        }

        /* Bảng môn học của Bộ thiết kế lại gọn gàng */
        .program-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .program-table th, .program-table td {
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
        }

        .program-table th {
            font-weight: bold;
            background-color: #edf2f7;
            color: #4a5568;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .bg-fixed { background-color: #fff; color: var(--text-dark); }
        .bg-choose { background-color: #fff; color: var(--text-dark); }

        /* Khung tương tác chọn môn */
        .selection-box {
            background-color: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .selection-title {
            font-weight: 700;
            color: var(--ivy-red);
            margin-bottom: 18px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            background: #fff;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .checkbox-label:hover {
            border-color: var(--ivy-red);
            background-color: #fff5f5;
        }

        .checkbox-label input {
            margin-right: 12px;
            transform: scale(1.15);
            accent-color: var(--ivy-red); /* Đổi màu ô checkbox thành đỏ đồng bộ */
        }

        .counter-info {
            text-align: right;
            font-weight: 600;
            color: #718096;
            margin-top: 12px;
            font-size: 13px;
        }
